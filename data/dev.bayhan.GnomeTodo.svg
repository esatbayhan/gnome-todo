<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3584e4"/>
      <stop offset="1" stop-color="#1a73e8"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>
  <!-- Paper/document -->
  <rect x="24" y="18" width="80" height="96" rx="8" ry="8" fill="url(#paper)" opacity="0.95"/>
  <!-- Checkbox 1 - checked -->
  <rect x="32" y="32" width="16" height="16" rx="3" ry="3" fill="#26a269" stroke="#1e7e54" stroke-width="1"/>
  <polyline points="35,40 39,45 47,34" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Line 1 - done (strikethrough) -->
  <rect x="56" y="37" width="40" height="4" rx="2" fill="#aaaaaa"/>
  <!-- Checkbox 2 - checked -->
  <rect x="32" y="56" width="16" height="16" rx="3" ry="3" fill="#26a269" stroke="#1e7e54" stroke-width="1"/>
  <polyline points="35,64 39,69 47,58" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Line 2 - done (strikethrough) -->
  <rect x="56" y="61" width="32" height="4" rx="2" fill="#aaaaaa"/>
  <!-- Checkbox 3 - unchecked (active task) -->
  <rect x="32" y="80" width="16" height="16" rx="3" ry="3" fill="#ffffff" stroke="#3584e4" stroke-width="1.5"/>
  <!-- Line 3 - active -->
  <rect x="56" y="85" width="36" height="4" rx="2" fill="#3584e4"/>
</svg>
